server:
  port: 18789
  host: "127.0.0.1"

llm:
  provider: zhipu
  model: glm-4-flash
  api_key: "${ZHIPU_API_KEY}"

wechat:
  enabled: false
  corp_id: "${WECHAT_CORP_ID}"
  agent_id: "${WECHAT_AGENT_ID}"
  secret: "${WECHAT_SECRET}"
  token: "${WECHAT_TOKEN}"
  encoding_aes_key: "${WECHAT_ENCODING_AES_KEY}"

memory:
  enabled: true
  max_memories: 1000
  embedding:
    provider: openrouter
    model: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
  hybrid_search:
    enabled: true
    vector_weight: 0.7
    fts_weight: 0.3
    min_score: 0.3

tools:
  search:
    provider: duckduckgo
