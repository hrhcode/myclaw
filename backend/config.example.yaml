server:
  port: 18790
  host: "127.0.0.1"

gateway:
  enabled: true

channels:
  web:
    enabled: true
  qq:
    enabled: false
    api_url: "http://localhost:6099"
    access_token: ""
  wechat:
    enabled: false
    corp_id: "${WECHAT_CORP_ID}"
    agent_id: "${WECHAT_AGENT_ID}"
    secret: "${WECHAT_SECRET}"
    token: "${WECHAT_TOKEN}"
    encoding_aes_key: "${WECHAT_ENCODING_AES_KEY}"

llm:
  provider: zhipu
  model: glm-4-flash
  models:
    - glm-4-flash
    - glm-4-plus
    - glm-4v-flash
    - glm-4v-plus
    - glm-4.1v-thinking-flash
  default_model: glm-4.1v-thinking-flash
  api_key: "${ZHIPU_API_KEY}"

memory:
  enabled: true
  max_memories: 1000
  embedding:
    provider: openrouter
    model: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
    api_key: "${OPENROUTER_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
  hybrid_search:
    enabled: true
    vector_weight: 0.7
    fts_weight: 0.3
    min_score: 0.3

tools:
  search:
    provider: duckduckgo
